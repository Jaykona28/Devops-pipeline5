name: Fully Automated CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # --- JOB 1: CONTINUOUS INTEGRATION ---
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub 
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} 
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lightweight-app:latest

  # --- JOB 2: CONTINUOUS DEPLOYMENT --
  deploy:
    needs: build and push #This ensures deployment happens only if build succeed
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible
          
      - name: Run Ansible Playbook for Deployment
        run: ansible-playbook deploy.yaml
        env:
          # Pass the Docker username to Ansible as an environment variable
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Verify Deployment
        run: |
          sleep 5 # Give the container a few seconds to start
          curl -f http://localhost:8080 || exit 1
          echo " Deployment Successful..!! :) App is responding."

